format = "$os$username$hostname$shlvl$directory$git_branch$git_commit$git_state$git_status$git_metrics$nix_shell$python$nodejs$rust$golang$java$ruby$php$docker_context$kubernetes$cmd_duration$jobs$status$line_break$character\n"
palette = "catppuccin_macchiato"

[battery]
charging_symbol = "⚡"
disabled = false
discharging_symbol = "💀"
empty_symbol = "🪫"
format = "[$symbol$percentage]($style) "
full_symbol = "🔋"
unknown_symbol = "❓"

[[battery.display]]
style = "bold red"
threshold = 10

[[battery.display]]
style = "bold yellow"
threshold = 30

[[battery.display]]
style = "green"
threshold = 100

[character]
error_symbol = "[❯](red)"
success_symbol = "[❯](peach)"

[cmd_duration]
format = "⏱️[$duration](yellow) "
min_time = 2000
show_milliseconds = false
style = "yellow"

[directory]
format = "[$read_only]($read_only_style)[$path](lavender) "
home_symbol = "~"
read_only = "🔒"
read_only_style = "red"
style = "bold lavender"
truncate_to_repo = true
truncation_length = 3
truncation_symbol = "…/"

[docker_context]
format = "[$symbol$context](blue) "
only_with_files = true
symbol = "🐳"

[git_branch]
format = "[$symbol$branch(:$remote_branch)](mauve) "
style = "bold mauve"
symbol = ""

[git_commit]
commit_hash_length = 8
format = "[$hash$tag](maroon) "
style = "maroon"
tag_disabled = false
tag_symbol = "🏷️"

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
disabled = false
format = "([+$added](green) )([-$deleted](red) )"
only_nonzero_diffs = true

[git_state]
am = "am"
am_or_rebase = "am/rb"
bisect = "bisect"
cherry_pick = "cherry"
format = "[$state($progress_current/$progress_total)](peach) "
merge = "merge"
rebase = "rebase"
revert = "revert"
style = "peach"

[git_status]
ahead = "⇡${count}"
behind = "⇣${count}"
conflicted = "="
deleted = "✘"
diverged = "⇕${ahead_count}⇣${behind_count}"
format = "([$all_status$ahead_behind](yellow)) "
modified = "!"
renamed = "»"
staged = "+"
stashed = "$"
style = "yellow"
untracked = "?"

[golang]
detect_files = ["go.mod"]
format = "[$symbol$version](teal) "
style = "teal"
symbol = "🐹"

[hostname]
disabled = false
format = "[$ssh_symbol$hostname](bold red) "
ssh_only = true
ssh_symbol = "🌐"
style = "bold red"
trim_at = "."

[java]
format = "[$symbol$version](red) "
style = "red"
symbol = "☕"

[jobs]
disabled = false
format = "[$symbol$number](blue) "
symbol = "✦"

[kubernetes]
detect_files = ["k8s"]
disabled = false
format = "[$symbol$context( \\($namespace\\))](cyan) "
symbol = "☸️"

[line_break]
disabled = false

[nix_shell]
format = "[$symbol$state](blue) "
impure_msg = "[impure](red)"
pure_msg = "[pure](green)"
style = "bold blue"
symbol = "❄️"

[nodejs]
detect_files = ["package.json", "yarn.lock", "pnpm-lock.yaml", ".nvmrc"]
format = "[$symbol$version](green) "
style = "green"
symbol = "⬢"

[os]
disabled = false

[os.symbols]
Alpine = "🏔️ "
Arch = "🔷 "
Debian = "🌀 "
Fedora = "🎩 "
Linux = "🐧 "
Macos = "🍎 "
NixOS = "❄️ "
Ubuntu = "🟠 "

[palettes.catppuccin_macchiato]
base = "#24273a"
blue = "#8aadf4"
crust = "#181926"
flamingo = "#f0c6c6"
green = "#a6da95"
lavender = "#b7bdf8"
mantle = "#1e2030"
maroon = "#ee99a0"
mauve = "#c6a0f6"
overlay0 = "#6e738d"
overlay1 = "#8087a2"
overlay2 = "#939ab7"
peach = "#f5a97f"
pink = "#f5bde6"
red = "#ed8796"
rosewater = "#f4dbd6"
sapphire = "#7dc4e4"
sky = "#91d7e3"
subtext0 = "#a5adcb"
subtext1 = "#b8c0e0"
surface0 = "#363a4f"
surface1 = "#494d64"
surface2 = "#5b6078"
teal = "#8bd5ca"
text = "#cad3f5"
yellow = "#eed49f"

[php]
format = "[$symbol$version](purple) "
style = "purple"
symbol = "🐘"

[python]
detect_files = ["requirements.txt", "pyproject.toml", "Pipfile", ".python-version"]
format = "[$symbol$version](green) "
style = "green"
symbol = "🐍"

[ruby]
format = "[$symbol$version](red) "
style = "red"
symbol = "💎"

[rust]
detect_files = ["Cargo.toml"]
format = "[$symbol$version](maroon) "
style = "maroon"
symbol = "🦀"

[shlvl]
disabled = false
format = "[$symbol$shlvl](bold yellow) "
style = "bold yellow"
symbol = "↕️"
threshold = 2

[status]
disabled = false
format = "[$symbol$status]($style) "
not_executable_symbol = "🚫"
not_found_symbol = "🔍"
sigint_symbol = "🧱"
signal_symbol = "⚡"
symbol = "✖"

[username]
disabled = false
format = "[$user](bold yellow)@"
show_always = false
style_user = "bold yellow"
