# ─── General ───────────────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # undercurl colors
set -g escape-time 10
set -g history-limit 10000
set -g mouse off
set -g base-index 1
setw -g pane-base-index 1
set -g set-clipboard on
set -g allow-passthrough on
set -g display-panes-time 10000
set -g focus-events on
set -g mode-keys vi

# ─── Keybindings ──────────────────────────────────────────────────────────────
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Pane styling ─────────────────────────────────────────────────────────────
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=#8aadf4,bold'

# ─── Plugins (TPM) ───────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'

# Theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "rounded"
set -g status-right "#{prefix_highlight}#{E:@catppuccin_status_application}#{E:@catppuccin_status_session}"
set -g status-left ""

# Floating panes
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 't'
set -g @floax-bind-menu 'T'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-change-path 'true'

# Session management
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# Vim-tmux navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# Prefix highlight
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=yellow,bold'

# Session switcher
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'

# Text extraction
set -g @plugin 'laktak/extrakto'

# URL/text picker
set -g @plugin 'fcsonline/tmux-thumbs'

# Fuzzy history search
set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-bind '/'

# ─── Initialize TPM (keep at bottom) ─────────────────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
