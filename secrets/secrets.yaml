# secrets/secrets.yaml
# このファイルはプレースホルダーです。実際の環境では sops で暗号化してください。
#
# 初回セットアップ手順:
# 1. age 鍵を生成: age-keygen -o ~/.config/sops/age/keys.txt
# 2. .sops.yaml の公開鍵を更新: age-keygen -y ~/.config/sops/age/keys.txt
# 3. このファイルを暗号化: sops secrets/secrets.yaml
#    （エディタが開いたら実際の値を入力して保存してください）
#
# 警告: 平文のシークレットをコミットしないこと
ssh-private-key-ed25519: "PLACEHOLDER"
ssh-public-key-ed25519: "PLACEHOLDER"
ssh-private-key-tanaka-site: "PLACEHOLDER"
github-token: "PLACEHOLDER"
