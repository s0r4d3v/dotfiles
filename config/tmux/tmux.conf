# ==============================================================================
# Terminal
# ==============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

set -g set-clipboard  on
set -g allow-passthrough on
set -sg escape-time   10
set -g focus-events   on

# ==============================================================================
# General
# ==============================================================================
set -g mouse          off
set -g history-limit  50000
set -g base-index     1
setw -g pane-base-index 1
set -g renumber-windows on

# ==============================================================================
# Prefix & bindings
# ==============================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"
bind -  split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"

# C-hjkl: move between tmux panes, or nvim windows if nvim is active
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\S+\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# ==============================================================================
# Popups
# ==============================================================================
bind t display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
bind f display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "fzf --preview 'bat --color=always {}' --bind 'enter:execute(nvim {})+abort'"

# ==============================================================================
# Vi copy mode
# ==============================================================================
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ==============================================================================
# Status bar — tokyonight-night palette
#   bg_dark  #16161e   bg       #1a1b26   bg_hl    #292e42
#   blue     #7aa2f7   magenta  #bb9af7   green    #9ece6a
#   fg       #c0caf5   fg_dim   #565f89
# ==============================================================================
set -g status on
set -g status-interval  5
set -g status-position  bottom
set -g status-justify   left
set -g status-style     "bg=#16161e,fg=#c0caf5"

# Left: session name
set -g status-left-length 30
set -g status-left \
  "#[bg=#7aa2f7,fg=#16161e,bold] 󱃾 #S #[bg=#16161e,fg=#7aa2f7]"

# Right: date + time
set -g status-right-length 40
set -g status-right \
  "#[fg=#565f89,bg=#16161e] │ #[fg=#c0caf5,bg=#292e42]  %a %d %b #[fg=#7aa2f7,bg=#292e42] #[bg=#7aa2f7,fg=#16161e,bold]  %H:%M "

# Window tabs
set -g window-status-separator      ""
set -g window-status-format         "#[fg=#565f89,bg=#16161e]  #I  #W  "
set -g window-status-current-format "#[fg=#16161e,bg=#bb9af7,bold]  #I  #W#{?window_zoomed_flag, 󰊓,}  "

# Window activity
set -g window-status-activity-style "fg=#9ece6a,bg=#16161e"
set -g monitor-activity on
set -g visual-activity  off

# ==============================================================================
# Pane borders
# ==============================================================================
set -g pane-border-style        "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-lines        single

# ==============================================================================
# Messages & copy mode
# ==============================================================================
set -g message-style  "bg=#7aa2f7,fg=#16161e,bold"
set -g mode-style     "bg=#bb9af7,fg=#16161e"
