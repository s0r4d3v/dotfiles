# =============================================================================
# Terminal
# =============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# =============================================================================
# Clipboard — OSC 52 passthrough (enables sync with Mac clipboard over SSH)
#
# set-clipboard on  → tmux uses OSC 52 to read/write the host clipboard
# allow-passthrough on → lets Neovim's OSC 52 sequences pass through tmux
#                        to the outer terminal (Ghostty)
# =============================================================================
set -g set-clipboard on
set -g allow-passthrough on

# =============================================================================
# Neovim compatibility
# =============================================================================
set -sg escape-time 10   # eliminates Neovim's "ESC key delay" warning
set -g focus-events on   # lets Neovim trigger autoread when switching windows

# =============================================================================
# General
# =============================================================================
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# =============================================================================
# Key bindings
# =============================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display "Reloaded"
bind -  split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"

# Pane navigation (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Copy mode
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection-and-cancel
